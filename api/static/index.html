<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant Vocal Médical</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            text-align: center;
            max-width: 550px;
            width: 90%;
        }

        h1 { color: #2c3e50; margin-bottom: 8px; font-size: 1.8em; }
        .subtitle { color: #7f8c8d; margin-bottom: 30px; font-size: 0.95em; }

        /* --- Bouton Micro --- */
        .mic-container { margin: 30px 0; }

        .mic-btn {
            width: 100px; height: 100px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white; font-size: 40px; cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(52, 152, 219, 0.4);
        }
        .mic-btn:hover { transform: scale(1.05); box-shadow: 0 12px 35px rgba(52, 152, 219, 0.5); }
        .mic-btn.recording {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.4);
            animation: pulse 1.5s infinite;
        }
        .mic-btn.processing {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            box-shadow: 0 8px 25px rgba(243, 156, 18, 0.4);
            cursor: wait;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.5); }
            70% { box-shadow: 0 0 0 20px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        .mic-status {
            margin-top: 15px; color: #7f8c8d; font-size: 0.9em; min-height: 24px;
        }
        .mic-status.recording { color: #e74c3c; font-weight: bold; }

        /* --- Résultats --- */
        .results { margin-top: 30px; text-align: left; }

        .result-card {
            background: #f8f9fa; border-radius: 12px; padding: 20px; margin-bottom: 12px;
            border-left: 4px solid #3498db; display: none;
        }
        .result-card.visible { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-label {
            font-size: 0.8em; color: #7f8c8d; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 6px;
        }
        .result-value { font-size: 1.05em; color: #2c3e50; font-weight: 500; }

        /* --- Badges d'intention --- */
        .intent-badge {
            display: inline-block; padding: 6px 16px; border-radius: 20px;
            font-weight: bold; font-size: 0.95em;
        }
        .intent-book_appointment { background: #d5f5e3; color: #27ae60; }
        .intent-cancel_appointment { background: #fadbd8; color: #e74c3c; }
        .intent-medical_urgency { background: #f5b7b1; color: #922b21; }
        .intent-info_practical { background: #d6eaf8; color: #2980b9; }
        .intent-off_topic { background: #eaecee; color: #7f8c8d; }
        .intent-default { background: #d6eaf8; color: #2980b9; }

        /* --- Carte réponse vocale --- */
        .response-card { border-left-color: #27ae60; background: #f0faf4; }
        .response-card .result-value { color: #27ae60; line-height: 1.5; }

        .urgency-card { border-left-color: #e74c3c; background: #fdf2f2; }
        .urgency-card .result-value { color: #c0392b; }

        /* --- Audio player --- */
        .audio-playing {
            display: none; align-items: center; justify-content: center;
            gap: 8px; margin-top: 10px; color: #27ae60; font-size: 0.9em;
        }
        .audio-playing.visible { display: flex; }
        .audio-playing .speaker { animation: speakerPulse 1s infinite; font-size: 1.4em; }

        @keyframes speakerPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* --- Saisie manuelle --- */
        .manual-input { margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee; }
        .manual-input p { color: #bdc3c7; font-size: 0.85em; margin-bottom: 10px; }
        .input-group { display: flex; gap: 8px; }
        .input-group input {
            flex: 1; padding: 12px 16px; border: 2px solid #eee;
            border-radius: 10px; font-size: 0.95em; outline: none; transition: border 0.3s;
        }
        .input-group input:focus { border-color: #3498db; }
        .input-group button {
            padding: 12px 20px; background: #3498db; color: white; border: none;
            border-radius: 10px; cursor: pointer; font-weight: bold; transition: background 0.3s;
        }
        .input-group button:hover { background: #2980b9; }

        /* --- Erreur --- */
        .error { border-left-color: #e74c3c; background: #fdf2f2; }
        .error .result-value { color: #e74c3c; }

        /* --- Historique --- */
        .history { margin-top: 25px; text-align: left; }
        .history h3 {
            color: #7f8c8d; font-size: 0.85em; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 10px;
        }
        .history-item {
            background: #f8f9fa; border-radius: 8px; padding: 12px 16px;
            margin-bottom: 8px; font-size: 0.85em;
        }
        .history-top { display: flex; justify-content: space-between; align-items: center; }
        .history-text { color: #2c3e50; flex: 1; margin-right: 10px; }
        .history-response {
            color: #27ae60; font-size: 0.9em; margin-top: 6px;
            padding-top: 6px; border-top: 1px solid #eee; font-style: italic;
        }

        /* --- Détails --- */
        .details-card { border-left-color: #8e44ad; background: #f5eef8; }
        .detail-item { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.95em; }
        .detail-label { color: #7f8c8d; }
        .detail-value { color: #2c3e50; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩺 Assistant Vocal Médical</h1>
        <p class="subtitle">Appuyez sur le micro et parlez pour décrire votre besoin</p>

        <!-- Bouton Microphone -->
        <div class="mic-container">
            <button class="mic-btn" id="micBtn" onclick="toggleRecording()">🎙️</button>
            <p class="mic-status" id="micStatus">Appuyez pour parler</p>
            <div class="audio-playing" id="audioPlaying">
                <span class="speaker">🔊</span> Réponse vocale en cours...
            </div>
        </div>

        <!-- Résultats -->
        <div class="results">
            <div class="result-card" id="transcriptionCard">
                <div class="result-label">📝 Transcription</div>
                <div class="result-value" id="transcriptionText"></div>
            </div>
            <div class="result-card" id="intentCard">
                <div class="result-label">🎯 Intention détectée</div>
                <div class="result-value"><span class="intent-badge" id="intentText"></span></div>
            </div>
            <div class="result-card response-card" id="responseCard">
                <div class="result-label">💬 Réponse de l'assistant</div>
                <div class="result-value" id="responseText"></div>
            </div>
            <div class="result-card details-card" id="detailsCard">
                <div class="result-label">📋 Détails</div>
                <div id="detailsContent"></div>
            </div>
            <div class="result-card error" id="errorCard">
                <div class="result-label">❌ Erreur</div>
                <div class="result-value" id="errorText"></div>
            </div>
        </div>

        <!-- Saisie manuelle -->
        <div class="manual-input">
            <p>ou saisissez votre demande :</p>
            <div class="input-group">
                <input type="text" id="textInput" placeholder="Ex: Je voudrais prendre rendez-vous avec Dr. House..."
                       onkeypress="if(event.key==='Enter') sendText()">
                <button onclick="sendText()">Envoyer</button>
            </div>
        </div>

        <!-- Historique -->
        <div class="history" id="historySection" style="display: none;">
            <h3>📋 Historique</h3>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let currentAudio = null;

        const micBtn = document.getElementById('micBtn');
        const micStatus = document.getElementById('micStatus');

        // --- Enregistrement vocal ---
        async function toggleRecording() {
            if (isRecording) { stopRecording(); } else { await startRecording(); }
        }

        async function startRecording() {
            try {
                if (currentAudio) { currentAudio.pause(); currentAudio = null; }
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    stream.getTracks().forEach(t => t.stop());
                    sendAudio(audioBlob);
                };

                mediaRecorder.start();
                isRecording = true;
                micBtn.classList.add('recording');
                micStatus.textContent = '🔴 Enregistrement en cours... Appuyez pour arrêter';
                micStatus.classList.add('recording');
                hideResults();
            } catch (err) {
                showError("Impossible d'accéder au microphone. Vérifiez les permissions.");
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                isRecording = false;
                micBtn.classList.remove('recording');
                micBtn.classList.add('processing');
                micStatus.textContent = '⏳ Traitement en cours...';
                micStatus.classList.remove('recording');
            }
        }

        // --- Envoi audio ---
        async function sendAudio(audioBlob) {
            const formData = new FormData();
            formData.append('file', audioBlob, 'recording.webm');
            try {
                const response = await fetch('/transcribe', { method: 'POST', body: formData });
                if (!response.ok) throw new Error(`Erreur serveur: ${response.status}`);
                const data = await response.json();
                displayResponse(data);
            } catch (err) {
                showError("Erreur lors du traitement : " + err.message);
            } finally {
                micBtn.classList.remove('processing');
                micStatus.textContent = 'Appuyez pour parler';
            }
        }

        // --- Envoi texte ---
        async function sendText() {
            const input = document.getElementById('textInput');
            const text = input.value.trim();
            if (!text) return;

            micBtn.classList.add('processing');
            micStatus.textContent = '⏳ Traitement en cours...';
            hideResults();

            try {
                const response = await fetch(`/predict?text=${encodeURIComponent(text)}`, { method: 'POST' });
                if (!response.ok) throw new Error(`Erreur serveur: ${response.status}`);
                const data = await response.json();
                displayResponse(data);
                input.value = '';
            } catch (err) {
                showError("Erreur : " + err.message);
            } finally {
                micBtn.classList.remove('processing');
                micStatus.textContent = 'Appuyez pour parler';
            }
        }

        // --- Affichage des résultats ---
        function displayResponse(data) {
            hideResults();

            // Transcription
            if (data.transcription) {
                document.getElementById('transcriptionText').textContent = `"${data.transcription}"`;
                document.getElementById('transcriptionCard').classList.add('visible');
            }

            // Intention
            const intentEl = document.getElementById('intentText');
            intentEl.textContent = formatIntent(data.intent);
            intentEl.className = `intent-badge intent-${data.intent || 'default'}`;
            document.getElementById('intentCard').classList.add('visible');

            // Réponse de l'assistant
            if (data.response) {
                const responseCard = document.getElementById('responseCard');
                document.getElementById('responseText').textContent = data.response;
                responseCard.className = 'result-card response-card visible';
                if (data.intent === 'medical_urgency') {
                    responseCard.className = 'result-card urgency-card visible';
                }
            }

            // Détails (rdv, infos, etc.)
            if (data.details) {
                const detailsContent = document.getElementById('detailsContent');
                detailsContent.innerHTML = '';
                for (const [key, value] of Object.entries(data.details)) {
                    const item = document.createElement('div');
                    item.className = 'detail-item';
                    item.innerHTML = `<span class="detail-label">${formatDetailLabel(key)}</span>
                                      <span class="detail-value">${value}</span>`;
                    detailsContent.appendChild(item);
                }
                document.getElementById('detailsCard').classList.add('visible');
            }

            // Jouer l'audio TTS
            if (data.audio) { playAudio(data.audio); }

            // Historique
            addToHistory(data);
        }

        // --- Lecture audio TTS ---
        function playAudio(base64Audio) {
            if (currentAudio) { currentAudio.pause(); }
            const audioData = `data:audio/mp3;base64,${base64Audio}`;
            currentAudio = new Audio(audioData);
            const audioPlaying = document.getElementById('audioPlaying');
            audioPlaying.classList.add('visible');

            currentAudio.onended = () => { audioPlaying.classList.remove('visible'); currentAudio = null; };
            currentAudio.onerror = () => { audioPlaying.classList.remove('visible'); currentAudio = null; };
            currentAudio.play().catch(() => audioPlaying.classList.remove('visible'));
        }

        function showError(msg) {
            hideResults();
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorCard').classList.add('visible');
        }

        function hideResults() {
            document.querySelectorAll('.result-card').forEach(c => c.classList.remove('visible'));
            document.getElementById('audioPlaying').classList.remove('visible');
        }

        function formatIntent(intent) {
            const labels = {
                'book_appointment': '📅 Prise de rendez-vous',
                'cancel_appointment': '❌ Annulation de rendez-vous',
                'medical_urgency': '🚨 Urgence médicale',
                'info_practical': 'ℹ️ Information pratique',
                'off_topic': '💬 Hors sujet'
            };
            return labels[intent] || `🔍 ${intent}`;
        }

        function formatDetailLabel(key) {
            const labels = {
                'doctor': '👨‍⚕️ Médecin', 'date': '📅 Date', 'time': '🕐 Heure',
                'slot_id': '🔢 N° créneau', 'key': '🔑 Type', 'value': '📄 Info'
            };
            return labels[key] || key;
        }

        function addToHistory(data) {
            const historySection = document.getElementById('historySection');
            const historyList = document.getElementById('historyList');
            historySection.style.display = 'block';

            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `
                <div class="history-top">
                    <span class="history-text">${data.transcription || '(texte)'}</span>
                    <span class="intent-badge intent-${data.intent || 'default'}" style="font-size: 0.75em;">
                        ${formatIntent(data.intent)}
                    </span>
                </div>
                ${data.response ? `<div class="history-response">→ ${data.response}</div>` : ''}
            `;
            historyList.insertBefore(item, historyList.firstChild);
        }
    </script>
</body>
</html>
