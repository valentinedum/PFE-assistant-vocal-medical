name: Assistant Vocal CI/CD

# Le pipeline se déclenche quand on push sur la branche main ou une branche feature, 
# ou lors d'une Pull Request vers main.
on:
  push:
    branches: [ "develop", "feature/*" ]
  pull_request:
    branches: [ "main", "develop"]

jobs:
  # ==========================================
  # 1. TESTS UNITAIRES
  # ==========================================
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10" 

      - name: Install test deps
        run: |
          pip install pytest
          # Optionnel : installer les dépendances de l'API besoin
          if [ -f api/requirements.txt ]; then pip install -r api/requirements.txt; fi

      - name: Run unit tests
        run: |
          # S'il n'y a pas encore de tests, on évite que pytest échoue (code 5)
          pytest tests/unit -q || [ $? -eq 5 ] && exit 0 || exit $?

  # ==========================================
  # 2. TEST D'INTÉGRATION 
  # ==========================================
  integration:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test deps
        run: |
          pip install pytest httpx
          if [ -f api/requirements.txt ]; then pip install -r api/requirements.txt; fi

      - name: Show docker versions
        run: |
          docker version
          docker compose version

      - name: Build and start core stack
        # On lance uniquement les services nécessaires pour faire tourner l'API
        run: |
          sed -i '/runtime: nvidia/d' docker-compose.yml
          
          docker compose up -d --build db mlflow ollama api
          docker ps -a

      - name: Warmup API
        run: |
          # On tente un appel, peu importe s'il échoue, l'idée est de déclencher le chargement en RAM
          curl -X POST http://localhost:8000/predict \
               -H "Content-Type: application/json" \
               -d '{"text": "warmup"}' --max-time 120 || true
      
      - name: Train and Register Model
        run: |
          docker compose run --rm train
          # On utilise curl pour dire à MLflow : "Mets la version 1 en Production"
          # L'API de MLflow permet de manipuler les alias sans script Python
          sleep 20
          curl -X POST "http://localhost:5000/api/2.0/mlflow/model-versions/transition-stage" \
               -H "Content-Type: application/json" \
               -d '{
                 "name": "medical_intent_classifier",
                 "version": "1",
                 "stage": "Production",
                 "archive_existing_versions": true
               }'

      - name : Run integration tests
        run: |
          # S'il n'y a pas encore de tests, on évite que pytest échoue (code 5)
          pytest -q tests/integration || [ $? -eq 5 ] && exit 0 || exit $?

      - name: Dump logs (always)
        if: always()
        run: |
          docker compose logs --no-color > compose-logs.txt || true

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: compose-logs.txt

      - name: Teardown
        if: always()
        run: |
          docker compose down -v