name: Assistant Vocal CI/CD

# Le pipeline se déclenche quand on push sur la branche main ou une branche feature, 
# ou lors d'une Pull Request vers main.
on:
  push:
    branches: [ "develop", "feature/*" ]
  pull_request:
    branches: [ "main", "develop"]

jobs:
  # ==========================================
  # 1. TESTS UNITAIRES
  # ==========================================
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10" 

      - name: Install test deps
        run: |
          pip install pytest httpx
          # Optionnel : installer les dépendances de l'API si tes tests en ont besoin
          if [ -f api/requirements.txt ]; then pip install -r api/requirements.txt; fi

      - name: Run unit tests
        run: |
          # S'il n'y a pas encore de tests, on évite que pytest échoue (code 5)
          pytest -q || [ $? -eq 5 ] && exit 0 || exit $?

  # ==========================================
  # 2. TEST D'INTÉGRATION (SMOKE TEST)
  # ==========================================
  integration:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - name: Show docker versions
        run: |
          docker version
          docker compose version

      - name: Build and start core stack
        # On lance uniquement les services nécessaires pour faire tourner l'API
        run: |
          sed -i '/runtime: nvidia/d' docker-compose.yml
          
          docker compose up -d --build db mlflow ollama api
          docker ps -a

      - name: Wait for API health
        # On boucle pour attendre que la route /health de ton app.py réponde
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health >/dev/null; then
              echo "✅ API is healthy"
              exit 0
            fi
            echo "⏳ En attente de l'API... ($i/30)"
            sleep 3
          done
          echo "❌ API healthcheck failed"
          docker compose logs --no-color > compose-logs.txt || true
          exit 1

      - name: Dump logs (always)
        if: always()
        run: |
          docker compose logs --no-color > compose-logs.txt || true

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: compose-logs.txt

      - name: Teardown
        if: always()
        run: |
          docker compose down -v